name: Build Pure ESP EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manuel tetikleme butonunu aktif eder

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        # requirements.txt hatasını engellemek için cache özelliğini kaldırıp manuel yöneteceğiz

    - name: Install Dependencies Directly
      run: |
        python -m pip install --upgrade pip
        # Tüm gerekli paketleri doğrudan buradan tek tek yüklüyoruz
        pip install pymem PyQt5 pyinstaller pywin32

    - name: Build Pure ESP with PyInstaller
      run: |
        # esp.py dosyasını tek parça, arayüzlü (siyah ekransız) ve admin yetkili derler
        pyinstaller --onefile --noconsole --uac-admin --name="Chameleon_Pure_ESP" esp.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pure-ESP-Executable
        path: dist/Chameleon_Pure_ESP.exe
        if-no-files-found: error
        retention-days: 5
        
